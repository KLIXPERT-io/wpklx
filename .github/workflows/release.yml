name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - run: bun install --frozen-lockfile

      - name: Read version from package.json
        id: version
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Cross-compile binaries
        run: |
          mkdir -p dist
          bun build src/index.ts --compile --target=bun-linux-x64 --outfile dist/wpklx-linux-x64
          bun build src/index.ts --compile --target=bun-darwin-x64 --outfile dist/wpklx-darwin-x64
          bun build src/index.ts --compile --target=bun-darwin-arm64 --outfile dist/wpklx-darwin-arm64
          bun build src/index.ts --compile --target=bun-windows-x64 --outfile dist/wpklx-windows-x64.exe

      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create rolling latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Rolling release — rebuilt on every push to `main`.
            Current version: **v${{ steps.version.outputs.version }}**

            ## Install (Linux / macOS)

            ```sh
            curl -fsSL https://raw.githubusercontent.com/KLIXPERT-io/wpklx/main/install.sh | bash
            ```

            ## Manual download

            | Platform | Binary |
            |----------|--------|
            | Linux x64 | `wpklx-linux-x64` |
            | macOS Intel | `wpklx-darwin-x64` |
            | macOS Apple Silicon | `wpklx-darwin-arm64` |
            | Windows x64 | `wpklx-windows-x64.exe` |
          files: |
            dist/wpklx-linux-x64
            dist/wpklx-darwin-x64
            dist/wpklx-darwin-arm64
            dist/wpklx-windows-x64.exe

      - name: Create versioned release (if tag doesn't exist)
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists — skipping."
          else
            gh release create "$VERSION" \
              --title "wpklx $VERSION" \
              --notes "Release $VERSION" \
              dist/wpklx-linux-x64 \
              dist/wpklx-darwin-x64 \
              dist/wpklx-darwin-arm64 \
              dist/wpklx-windows-x64.exe
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
